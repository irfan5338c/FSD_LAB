<!DOCTYPE html>
<html>
<head>
    <title>Time Table</title>
</head>
<body>

<table border="2" cellspacing="5" cellpadding="10">
    <caption>Weekly Time Table</caption>

    <tr>
        <th>Day/Time</th>
        <th>9-10</th>
        <th>10-11</th>
        <th>11-12</th>
        <th>12-1</th>
        <th>1-2</th>
        <th>2-3</th>
    </tr>

    <tr>
        <td>Monday</td>
        <td>Maths</td>
        <td>Physics</td>
        <td>Chemistry</td>
        <td rowspan="5">Lunch</td>
        <td colspan="2">Lab</td>
    </tr>

    <tr>
        <td>Tuesday</td>
        <td>English</td>
        <td>Maths</td>
        <td>Physics</td>
        <td>Computer</td>
        <td>Sports</td>
    </tr>

    <tr>
        <td>Wednesday</td>
        <td colspan="2">Workshop</td>
        <td>Chemistry</td>
        <td>Maths</td>
        <td>Library</td>
    </tr>

    <tr>
        <td>Thursday</td>
        <td>Physics</td>
        <td>English</td>
        <td>Maths</td>
        <td colspan="2">Seminar</td>
    </tr>

    <tr>
        <td>Friday</td>
        <td>Computer</td>
        <td>Physics</td>
        <td>Chemistry</td>
        <td>English</td>
        <td>Sports</td>
    </tr>

</table>

</body>
</html>
