<!DOCTYPE html>
<html>
<head>
    <title>Loops Example</title>
    <script>
        function printNumbers() {

            let forLoop = "";
            let whileLoop = "";
            let doWhileLoop = "";

            // 1. For Loop
            for (let i = 1; i <= 10; i++) {
                forLoop += i + " ";
            }

            // 2. While Loop
            let j = 1;
            while (j <= 10) {
                whileLoop += j + " ";
                j++;
            }

            // 3. Do-While Loop
            let k = 1;
            do {
                doWhileLoop += k + " ";
                k++;
            } while (k <= 10);

            // Display output
            document.getElementById("output").innerHTML =
                "For Loop: " + forLoop + "<br>" +
                "While Loop: " + whileLoop + "<br>" +
                "Do-While Loop: " + doWhileLoop;
        }
    </script>
</head>
<body onload="printNumbers()">

    <h2>Print Numbers 1 to 10</h2>

    <p id="output"></p>

</body>
</html>
