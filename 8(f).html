<!DOCTYPE html>
<html>
<head>
    <title>Denomination</title>
    <script>
        function showDenomination() {

            let amount = parseInt(prompt("Enter amount:"));

            let hundreds = Math.floor(amount / 100);
            amount %= 100;

            let fifties = Math.floor(amount / 50);
            amount %= 50;

            let twenties = Math.floor(amount / 20);
            amount %= 20;

            let tens = Math.floor(amount / 10);
            amount %= 10;

            let fives = Math.floor(amount / 5);
            amount %= 5;

            let twos = Math.floor(amount / 2);
            amount %= 2;

            let ones = amount;

            // Display result
            document.getElementById("output").innerHTML =
                hundreds + " - 100's<br>" +
                fifties + " - 50's<br>" +
                twenties + " - 20's<br>" +
                tens + " - 10's<br>" +
                fives + " - 5's<br>" +
                twos + " - 2's<br>" +
                ones + " - 1's";
        }
    </script>
</head>
<body onload="showDenomination()">

    <h2>Denomination of Amount</h2>

    <p id="output"></p>

</body>
</html>
