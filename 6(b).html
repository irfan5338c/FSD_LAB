<!DOCTYPE html>
<html>
<head>
    <title>Internal and External JavaScript</title>

    <!-- Internal JavaScript -->
    <script>
        function internalFunction() {
            document.getElementById("int").innerHTML = "This is Internal JavaScript";
        }
    </script>

    <!-- External JavaScript -->
    <script src="script.js"></script>

</head>
<body>

    <h2>JavaScript Example</h2>

    <!-- Internal JS -->
    <p id="int">Click button for internal JS</p>
    <button onclick="internalFunction()">Internal JS</button>

    <br><br>

    <!-- External JS -->
    <p id="ext">Click button for external JS</p>
    <button onclick="externalFunction()">External JS</button>

</body>
</html>
