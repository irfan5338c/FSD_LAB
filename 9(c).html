<!DOCTYPE html>
<html>
<head>
    <title>Registration Form Validation</title>
    <script>
        function validateForm() {
            let name = document.getElementById("name").value;
            let mobile = document.getElementById("mobile").value;
            let email = document.getElementById("email").value;

            // Name Validation
            let namePattern = /^[A-Za-z][A-Za-z0-9]{5,}$/;

            // Mobile Validation
            let mobilePattern = /^[0-9]{10}$/;

            // Email Validation
            let emailPattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$/;

            if (!namePattern.test(name)) {
                alert("Invalid Name! Must start with letter and be at least 6 characters.");
                return false;
            }

            if (!mobilePattern.test(mobile)) {
                alert("Invalid Mobile! Must be exactly 10 digits.");
                return false;
            }

            if (!emailPattern.test(email)) {
                alert("Invalid Email format!");
                return false;
            }

            alert("Form Submitted Successfully!");
            return true;
        }
    </script>
</head>
<body>

    <h2>Registration Form</h2>

    <form onsubmit="return validateForm()">
        Name: <input type="text" id="name"><br><br>
        Mobile: <input type="text" id="mobile"><br><br>
        Email: <input type="text" id="email"><br><br>

        <input type="submit" value="Submit">
    </form>

</body>
</html>
