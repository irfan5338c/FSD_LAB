<!DOCTYPE html>
<html>
<head>
    <title>CSS Styles Example</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        /* Selector: h2 */
        h2 {
            color: red;           /* property: color, value: red */
            background-color: yellow; /* property: background-color, value: yellow */
        }

        /* Selector: #box */
        #box {
            border: 2px solid black; /* property: border, value: 2px solid black */
            padding: 10px;           /* property: padding, value: 10px */
        }
    </style>
</head>

<body>

    <!-- External CSS applied -->
    <h1>External CSS Example</h1>

    <!-- Internal CSS applied -->
    <h2>Internal CSS Example</h2>

    <!-- External CSS using class selector -->
    <p class="para">This is a paragraph styled using external CSS.</p>

    <!-- Internal CSS using ID selector -->
    <div id="box">
        This box uses internal CSS.
    </div>

    <!-- Inline CSS -->
    <p style="color: purple; font-weight: bold;">
        <!-- Selector: this paragraph (inline)
             property: color, value: purple
             property: font-weight, value: bold -->
        This is an inline styled paragraph.
    </p>

</body>
</html>
