<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Font & Text Properties</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }
        .example-container {
            border: 1px solid #ccc; 
            padding: 15px;
            margin-bottom: 10px;
            background-color: #f9f9f9;
        }

        /* i. font-size */
        .font-size-example {
            font-size: 24px;
        }

        /* ii. font-weight */
        .font-weight-example {
            font-weight: bold;
        }

        /* iii. font-style */
        .font-style-example {
            font-style: italic;
        }

        /* iv. text-decoration */
        .text-decoration-example {
            text-decoration: underline wavy red;
        }

        /* v. text-transform */
        .text-transform-example {
            text-transform: uppercase;
        }

        /* vi. text-align */
        .text-align-example {
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>CSS Font and Text Properties Example</h1>

    <div class="example-container">
        <p class="font-size-example">This text uses <code>font-size: 24px;</code>.</p>
    </div>

    <div class="example-container">
        <p class="font-weight-example">This text uses <code>font-weight: bold;</code>.</p>
    </div>

    <div class="example-container">
        <p class="font-style-example">This text uses <code>font-style: italic;</code>.</p>
    </div>

    <div class="example-container">
        <p class="text-decoration-example">This text uses <code>text-decoration: underline wavy red;</code>.</p>
    </div>

    <div class="example-container">
        <p class="text-transform-example">This text uses <code>text-transform: uppercase;</code>.</p>
    </div>

    <div class="example-container">
        <p class="text-align-example">This text is centered using <code>text-align: center;</code>.</p>
    </div>

</body>
</html>
