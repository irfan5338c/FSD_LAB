<!DOCTYPE html>
<html>
<head>
    <title>Audio and Video Embedding Example</title>
</head>
<body>

    <h1>Embedding Audio</h1>
    <p>This example embeds an audio file with default controls:</p>
    
    <!-- Audio Element -->
    <audio controls>
        <source src="your_audio_file.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <h1>Embedding Video</h1>
    <p>This example embeds a video file with default controls and specified dimensions:</p>
    
    <!-- Video Element -->
    <video width="450" height="250" controls>
        <source src="your_video_file.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</body>
</html>
