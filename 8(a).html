<!DOCTYPE html>
<html>
<head>
    <title>Largest Number</title>
    <script>
        function findLargest() {

            // گرفتن input using prompt
            let num1 = parseInt(prompt("Enter first integer:"));
            let num2 = parseInt(prompt("Enter second integer:"));
            let num3 = parseInt(prompt("Enter third integer:"));

            let result;

            // Check if all are equal
            if (num1 === num2 && num2 === num3) {
                result = "EQUAL NUMBERS";
                document.getElementById("output").innerHTML = result;
            } 
            else {
                // Find largest
                let largest = Math.max(num1, num2, num3);

                result = largest + " LARGER NUMBER";

                // Display in HTML
                document.getElementById("output").innerHTML = result;

                // Information message dialog
                alert(result);
            }
        }
    </script>
</head>
<body onload="findLargest()">

    <h2>Find the Largest Number</h2>

    <p id="output"></p>

</body>
</html>
