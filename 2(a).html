<!DOCTYPE html>
<html>
<head>
    <title>HTML Tables</title>
</head>
<body>

<h2 align="center">Working of Tables</h2>
<center>
<table border="1">
    <tr>
        <th rowspan="2">S.No</th>
        <th rowspan="2">Name</th>
        <th colspan="2">Marks</th>
    </tr>

    <tr>
        <th>Maths</th>
        <th>Science</th>
    </tr>

    <tr>
        <td>1</td>
        <td>ALEX</td>
        <td>80</td>
        <td>85</td>
    </tr>

    <tr>
        <td>2</td>
        <td>ARRON</td>
        <td>75</td>
        <td>90</td>
    </tr>

    <tr>
        <td rowspan="2">3</td>
        <td rowspan="2">QUILL</td>
        <td>70</td>
        <td>88</td>
    </tr>

    <tr>
        <td>72</td>
        <td>86</td>
    </tr>

</table>
</center>
</body>
</html>
