<!DOCTYPE html>
<html>
<head>
    <title>CSS Color References</title>
    <style>
        /* Color Name */
        .colorName {
            color: red;
        }

        /* HEX Value */
        .hexColor {
            color: #00ff00;
        }

        /* RGB Value */
        .rgbColor {
            color: rgb(0, 0, 255);
        }

        /* RGBA Value */
        .rgbaColor {
            color: rgba(255, 0, 0, 0.5);
        }

        /* HSL Value */
        .hslColor {
            color: hsl(120, 100%, 50%);
        }

        /* HSLA Value */
        .hslaColor {
            color: hsla(240, 100%, 50%, 0.5);
        }
    </style>
</head>
<body>

<h2 class="colorName">This is Color Name (Red)</h2>

<h2 class="hexColor">This is HEX Color (#00ff00)</h2>

<h2 class="rgbColor">This is RGB Color (Blue)</h2>

<h2 class="rgbaColor">This is RGBA Color (Transparent Red)</h2>

<h2 class="hslColor">This is HSL Color (Green)</h2>

<h2 class="hslaColor">This is HSLA Color (Transparent Blue)</h2>

</body>
</html>
