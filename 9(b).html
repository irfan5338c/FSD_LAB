<!DOCTYPE html>
<html>
<head>
    <title>Number Operations</title>
    <script>

        // Factorial
        function factorial() {
            let n = parseInt(document.getElementById("num").value);
            let fact = 1;
            for (let i = 1; i <= n; i++) {
                fact *= i;
            }
            document.getElementById("output").innerHTML = "Factorial: " + fact;
        }

        // Fibonacci
        function fibonacci() {
            let n = parseInt(document.getElementById("num").value);
            let a = 0, b = 1, result = "";

            while (a <= n) {
                result += a + " ";
                let temp = a + b;
                a = b;
                b = temp;
            }

            document.getElementById("output").innerHTML =
                "Fibonacci Series: " + result;
        }

        // Prime Numbers
        function prime() {
            let n = parseInt(document.getElementById("num").value);
            let result = "";

            for (let i = 2; i <= n; i++) {
                let isPrime = true;
                for (let j = 2; j <= i / 2; j++) {
                    if (i % j === 0) {
                        isPrime = false;
                        break;
                    }
                }
                if (isPrime) {
                    result += i + " ";
                }
            }

            document.getElementById("output").innerHTML =
                "Prime Numbers: " + result;
        }

        // Palindrome
        function palindrome() {
            let n = document.getElementById("num").value;
            let original = n;
            let reverse = n.split("").reverse().join("");

            let result = (original === reverse) ? "Palindrome" : "Not Palindrome";

            document.getElementById("output").innerHTML =
                "Result: " + result;
        }

    </script>
</head>
<body>

    <h2>Number Operations</h2>

    Enter Number: 
    <input type="text" id="num">

    <br><br>

    <button onclick="factorial()">Factorial</button>
    <button onclick="fibonacci()">Fibonacci</button>
    <button onclick="prime()">Prime</button>
    <button onclick="palindrome()">Palindrome</button>

    <br><br>

    <p id="output"></p>

</body>
</html>
